<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Par ou Ímpar</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(15px);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 2rem;
      color: #38bdf8;
    }

    .inputs {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    select, input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      background: #1e293b;
      color: white;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px #38bdf8;
    }

    .resultado {
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      background: #0f172a;
      text-align: center;
      font-size: 1.5rem;
    }

    .codigo {
      margin-top: 20px;
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      font-family: monospace;
      white-space: pre-wrap;
      color: #22c55e;
      border: 1px solid #1e293b;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>💻 Par ou Ímpar Multi-Linguagens</h1>

    <div class="inputs">
      <select id="linguagem">
        <option value="javascript">JavaScript</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="csharp">C#</option>
      </select>

      <input type="number" id="numero" placeholder="Digite um número">
    </div>

    <button onclick="verificar()">Verificar</button>

    <div class="resultado" id="resultado">
      Resultado aparecerá aqui...
    </div>

    <div class="codigo" id="codigo">
      Código da linguagem aparecerá aqui...
    </div>
  </div>

  <script>
    function verificar() {
      let numero = document.getElementById("numero").value;
      let linguagem = document.getElementById("linguagem").value;

      if (numero === "") {
        alert("Digite um número!");
        return;
      }

      let resultado = numero % 2 === 0 ? "✅ PAR" : "❌ ÍMPAR";

      let codigo = {
        javascript:
`let num = ${numero};
if (num % 2 === 0) {
  console.log("Par");
} else {
  console.log("Ímpar");
}`,

        python:
`num = ${numero}
if num % 2 == 0:
    print("Par")
else:
    print("Ímpar")`,

        java:
`int num = ${numero};
if (num % 2 == 0) {
  System.out.println("Par");
} else {
  System.out.println("Ímpar");
}`,

        csharp:
`int num = ${numero};
if (num % 2 == 0) {
  Console.WriteLine("Par");
} else {
  Console.WriteLine("Ímpar");
}`
      };

      document.getElementById("resultado").innerText = resultado;
      document.getElementById("codigo").innerText = codigo[linguagem];
    }
  </script>

</body>
</html>
